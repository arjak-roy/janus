# coturn TURN server configuration for GTS Meet
# Provides relay for WebRTC clients behind symmetric NAT / restrictive firewalls

listening-port=3478
fingerprint
lt-cred-mech

# Static credentials (match janus.jcfg and frontend VITE_TURN_* vars)
user=janususer:turnpassword

realm=gts-meet

# External/public IP of the server (update to match your deployment)
external-ip=13.51.211.112

# UDP relay port range — ensure these are open in your security group/firewall
min-port=49152
max-port=65535

# Logging
log-file=stdout
verbose

# Disable TLS/DTLS on the TURN listener itself
# (WebRTC overs DTLS-SRTP encryption end-to-end regardless)
no-tls
no-dtls
