services:
  janus-gateway:
    image: 'sucwangsr/janus-webrtc-gateway-docker:latest'
    container_name: janus-gateway
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4  
    network_mode: "host"
    environment:
      - JANUS_NAT_1_1_IP=${JANUS_NAT_1_1_IP:-}
    volumes:
      - ./conf/janus.jcfg:/usr/local/etc/janus/janus.jcfg
      - ./conf/janus.transport.websockets.jcfg:/usr/local/etc/janus/janus.transport.websockets.jcfg
      - ./conf/janus.plugin.videoroom.jcfg:/usr/local/etc/janus/janus.plugin.videoroom.jcfg
      - ./conf/janus.plugin.textroom.jcfg:/usr/local/etc/janus/janus.plugin.textroom.jcfg
    command: ["/usr/local/bin/janus", "-F", "/usr/local/etc/janus"]

  db:
    image: postgres:15-alpine
    container_name: janus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - janus-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: janus-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JANUS_API_SECRET=${JANUS_API_SECRET:-}
      - API_SHARED_SECRET=${API_SHARED_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRY=${JWT_EXPIRY:-2h}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - JANUS_HTTP_URL=${JANUS_HTTP_URL:-http://172.28.0.1:8088/janus}
    networks:
      - janus-net
    depends_on:
      janus-gateway:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: janus-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
      - "3001:443"
    volumes:
      - ./certs/cert.crt:/etc/nginx/cert.crt:ro
      - ./certs/cert.key:/etc/nginx/cert.key:ro
    depends_on:
      backend:
        condition: service_healthy
      janus-gateway:
        condition: service_started
    networks:
      - janus-net

volumes:
  postgres_data:

networks:
  janus-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1