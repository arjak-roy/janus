map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_origin $janus_allowed_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$" $http_origin;
    "~^https?://127\\.0\\.0\\.1(:[0-9]+)?$" $http_origin;
    "~^https?://192\\.168\\." $http_origin;
    "~^https?://10\\." $http_origin;
    "~^https?://172\\.(1[6-9]|2[0-9]|3[0-1])\\." $http_origin;
    "~." $http_origin;
}

server {
    listen 80;
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/cert.crt;
    ssl_certificate_key /etc/nginx/cert.key;
    root /usr/share/nginx/html;
    index index.html;

  
   # Proxy API requests to the internal backend container
    location /api/ {
        proxy_pass http://janus-backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Proxy health endpoint
    location /health {
        proxy_pass http://janus-backend:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
    }

    # Proxy Janus WebSocket signaling (host network via host.docker.internal)
    location /janus-ws {
        proxy_pass http://172.28.0.1:8188;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $janus_allowed_origin;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # SPA fallback — any route that doesn't match a file serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
